# App Name
spring.application.name=burnout-system

# Live Cloud MySQL Database (Ye rehna zaruri hai)
spring.datasource.url=jdbc:mysql://mysql-1688037b-ajeetsingh-3ea8.l.aivencloud.com:28826/defaultdb?ssl-mode=REQUIRED&sessionVariables=FOREIGN_KEY_CHECKS=0
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari Pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000

# Server Port
server.port=${PORT:10000}

# Multipart Config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Mail Configuration (Mailtrap Final) ---
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.writetimeout=5000