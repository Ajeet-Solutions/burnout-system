spring.application.name=burnout-system

# Live Cloud MySQL Database Connection Configuration
spring.datasource.url=jdbc:mysql://mysql-1688037b-ajeetsingh-3ea8.l.aivencloud.com:28826/defaultdb?ssl-mode=REQUIRED&sessionVariables=FOREIGN_KEY_CHECKS=0
spring.datasource.username=avnadmin
# Fetches the database password securely from Windows Environment Variables
spring.datasource.password=${DB_PASSWORD}

# Hibernate ORM and SQL Logging Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari Connection Pool Management for Cloud Database Optimization
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000

# Application Deployment Port Configuration
server.port=8080

# Maximum Allowed Size Configuration for Multipart File Uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Google SMTP Mail Server Configuration for Notifications
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ajeet.singh896036@gmail.com
# Fetches the 16-digit Gmail App Password securely from Windows Environment Variables
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Enables Detailed Debug Logging for SMTP Email Server Sessions
spring.mail.properties.mail.debug=true