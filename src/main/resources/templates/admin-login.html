<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOS - Admin Login Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark min-vh-100 d-flex align-items-center justify-content-center">

<div class="container" style="max-width: 400px;">
    <div class="card p-4 border-0 shadow-lg bg-white rounded-3">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-danger mb-1"><i class="fa-solid fa-shield-halved me-2"></i>Admin Login</h4>
            <p class="text-muted small mb-0">Access management dashboard control console</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger p-2 small text-center" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> Invalid Username or Password!
        </div>

        <form th:action="@{/admin-login}" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Admin Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Secret Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-key text-muted"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter security password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold rounded-pill shadow-sm">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Access Admin Console
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none small text-secondary"><i class="fa-solid fa-arrow-left me-1"></i> Back to User Portal</a>
        </div>
    </div>
</div>

</body>
</html>
