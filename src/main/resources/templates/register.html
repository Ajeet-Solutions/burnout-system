<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOS - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light min-vh-100 d-flex flex-column justify-content-between">

<div th:replace="~{components/navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center align-items-center g-4">
        <div class="col-md-5 d-none d-md-block text-center">
            <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&q=80&w=500" alt="Sign up" class="img-fluid rounded-4 shadow-sm">
        </div>
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0">
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted small mb-4">Join us to start your burnout assessment.</p>

                <form th:action="@{/register}" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Confirm Password</label>
                        <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm password" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Upload Profile Picture</label>
                        <input type="file" name="profileImage" id="profileImageInput" class="form-control" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
                </form>
                <p class="text-center small mt-3 mb-0">Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-bold">Login</a></p>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{components/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
