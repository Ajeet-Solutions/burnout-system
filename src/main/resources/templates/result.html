<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOS - Assessment Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light py-5">
<div th:replace="~{components/navbar :: nav}"></div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card p-4 border-0 shadow-sm bg-white text-center">
                <h4 class="fw-bold text-dark mb-4">Your Assessment Result</h4>

                <div class="mx-auto border border-5 rounded-circle d-flex align-items-center justify-content-center mb-3 border-secondary" style="width: 130px; height: 130px;">
                    <div>
                        <h2 class="fw-bold mb-0 text-dark" th:text="${totalScore}">0</h2>
                        <span class="text-muted small">/15 Max</span>
                    </div>
                </div>

                <p class="small text-muted mb-1">Burnout Level Status</p>
                <h5 class="fw-bold mb-4" th:classappend="${colorClass}" th:text="${status}">HEALTH LEVEL</h5>

                <div class="row text-start g-3 mb-4">
                    <div class="col-sm-6">
                        <div class="border p-3 rounded bg-light h-100">
                            <h6 class="fw-bold small mb-2">Score Details</h6>
                            <p class="small mb-1">Total Marks: <span th:text="${totalScore}">0</span> / 15</p>
                            <p class="small mb-1">Assessment Code: <span class="fw-medium text-dark">BDOS-ACTIVE</span></p>
                            <p class="small mb-0">Execution Date: <span class="text-dark">20 May 2026</span></p>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="border p-3 rounded bg-light h-100">
                            <h6 class="fw-bold small mb-2 text-primary">System Recommendations</h6>
                            <p class="small mb-0 text-secondary" th:text="${advice}">System feedback goes here.</p>
                        </div>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 justify-content-center">
                    <a th:href="@{/email-mock}" class="btn btn-primary px-4">Download / Email Report</a>
                    <a th:href="@{/}" class="btn btn-outline-secondary px-4">Go to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{components/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
