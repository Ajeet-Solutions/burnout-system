<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDOS - Assessment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div th:replace="~{components/navbar :: nav}"></div>

<div class="container py-5 flex-grow-1">
    <div class="card p-4 border-0 shadow-sm bg-white">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0">Assessment History</h4>
                <p class="text-muted small mb-0">Track and review all your previous burnout test submissions.</p>
            </div>
            <a th:href="@{/}" class="btn btn-sm btn-outline-secondary px-3">Back to Home</a>
        </div>

        <div class="table-responsive">
            <table class="table align-middle table-hover border-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="small text-muted">Execution Date & Time</th>
                    <th scope="col" class="small text-muted">Total Score</th>
                    <th scope="col" class="small text-muted">Burnout Status Level</th>
                    <th scope="col" class="small text-muted">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="test : ${historyList}">
                    <td class="text-secondary" th:text="${#temporals.format(test.executionDate, 'dd MMMM yyyy - hh:mm a')}">20 May 2026</td>

                    <td><strong th:text="${test.totalScore + ' / 15'}">0 / 15</strong></td>

                    <td>
                            <span class="badge px-3 py-2 rounded-pill bg-primary bg-opacity-10 text-primary fw-semibold"
                                  th:text="${test.status}">Low Burnout</span>
                    </td>

                    <td>
                        <a th:href="@{/recommendations}" class="btn btn-sm btn-light border">
                            <i class="fa-solid fa-eye me-1"></i> View
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(historyList)}">
                    <td colspan="4" class="text-center text-muted py-4">No previous evaluation records found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{components/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
