<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnout Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://images.unsplash.com/photo-1506126613408-eca07ce68773");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }

        .assessment-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .assessment-card {
            width: 600px;
            padding: 35px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
            transition: 0.4s;
        }

        .assessment-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .form-select {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 10px;
            color: #333;
        }

        .btn-submit {
            width: 100%;
            font-weight: bold;
            border-radius: 30px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.05);
        }

        .footer-section {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
            border-top: 3px solid #fda085;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Burnout System</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link active" href="result.html">Result</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="assessment-container">
        <div class="assessment-card">
            <h2 class="text-center mb-4">
                <i class="fa fa-brain"></i> Burnout Assessment
            </h2>

            <form id="assessmentForm">
                <div id="dynamicQuestionsContainer">
                    <p class="text-center text-warning">Loading questions from database...</p>
                </div>

                <br>
                <button type="submit" class="btn btn-warning btn-submit">
                    Submit Assessment
                </button>
            </form>
        </div>
    </div>

    <footer class="footer-section text-center p-4 mt-4">
        <p>© 2026 Burnout Detection System | All Rights Reserved</p>
        <p>Developed by: <strong>Ajeet Singh</strong></p>
    </footer>

	<script>
	    let globalQuestionsCount = 0; 

	    // Fetch dynamic questions from database
	    document.addEventListener("DOMContentLoaded", function() {
	        fetch("https://burnout-system-iwyd.onrender.com/api/assessment/questions")
	        .then(res => {
	            if(!res.ok) throw new Error("Server error");
	            return res.json();
	        })
	        .then(questionsList => {
	            const container = document.getElementById("dynamicQuestionsContainer");
	            container.innerHTML = ""; 
	            globalQuestionsCount = questionsList.length; 

	            questionsList.forEach((q, index) => {
	                const questionBlock = `
	                    <p class="${index > 0 ? 'mt-3' : ''}">${index + 1}. ${q.questionText}</p>
	                    <select id="q${index + 1}" class="form-select form-control assessment-select">
	                        <option value="Never">Never</option>
	                        <option value="Sometimes">Sometimes</option>
	                        <option value="Often">Often</option>
	                    </select>
	                `;
	                container.innerHTML += questionBlock;
	            });
	        })
	        .catch(err => {
	            console.error("Failed to load evaluation questions:", err);
	            document.getElementById("dynamicQuestionsContainer").innerHTML = 
	                "<p class='text-danger text-center'>Error: Unable to load assessment questions from database server.</p>";
	        });
	    });

	    // Handle Form Submission
	    document.getElementById("assessmentForm").addEventListener("submit", function(event) {
	        event.preventDefault(); 

	        const email = localStorage.getItem("userEmail");
	        if (!email) {
	            alert("Authentication Required: Please login first!");
	            window.location.href = "login.html";
	            return;
	        }

	        const submitBtn = event.target.querySelector('button[type="submit"]');
	        if (submitBtn) {
	            submitBtn.disabled = true;
	            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving to Database...`;
	        }

	        function getScore(value) {
	            if (value === "Never") return 0;
	            if (value === "Sometimes") return 1;
	            if (value === "Often") return 2;
	            return 0;
	        }

	        let total = 0;
	        
	     
	        let scores = { q1Score: 0, q2Score: 0, q3Score: 0 };

	        for (let i = 1; i <= globalQuestionsCount; i++) {
	            const element = document.getElementById(`q${i}`);
	            if (element) {
	                const val = element.value;
	                const elementScore = getScore(val);
	                total += elementScore;
	                
	                
	                if (i <= 3) {
	                    scores[`q${i}Score`] = elementScore;
	                }
	            }
	        }

	        // Threshold Rules logic tracking
	        let statusText = "Low Risk";
	        if (total >= 5) statusText = "High Risk";
	        else if (total >= 3) statusText = "Medium Risk";

	        // Construct payload strictly aligned with Spring Model Entity
	        const assessmentData = {
	            ...scores,
	            totalScore: total,
	            resultStatus: statusText
	        };

	        console.log("Sending Data to Backend Pipeline:", assessmentData);

	        localStorage.setItem("latestScore", total);
	        localStorage.setItem("latestStatus", statusText);

	        const queryParams = new URLSearchParams({ email: email });

	        fetch(`https://burnout-system-iwyd.onrender.com/api/assessment/submit?${queryParams.toString()}`, {
	            method: "POST",
	            headers: {
	                "Content-Type": "application/json",
	                "Accept": "application/json"
	            },
	            body: JSON.stringify(assessmentData)
	        })
	        .then(response => {
	            if(!response.ok) throw new Error("Data stream reject.");
	            window.location.href = "result.html";
	        })
	        .catch(error => {
	            console.error("Network Transmission Error:", error);
	            alert("Error: Database connection lost. Redirecting with backup cache.");
	            window.location.href = "result.html";
	        });
	    });
	</script>
</body>

</html>
