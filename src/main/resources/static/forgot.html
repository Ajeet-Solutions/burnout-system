<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }
        .forgot-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .footer-section {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
            border-top: 3px solid #fda085;
        }
        .footer-section a {
            color: #fda085;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Burnout System</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="forgot-container">
        <div class="forgot-card">
            <h3 class="text-center fw-bold mb-4" style="color:#333;">Reset Password</h3>
            <p class="text-muted text-center small mb-4">Enter your registered email address below, and we will send you a temporary password.</p>
            
            <form id="forgotForm">
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color:#333;">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold">Send Temporary Password</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none small text-secondary">Back to Login</a>
            </div>
        </div>
    </div>

    <footer class="footer-section text-center p-4 mt-4">
        <p>© 2026 Burnout Detection System | All Rights Reserved</p>
        <p>Developed by: <strong>Ajeet Singh</strong></p>
    </footer>

    <script>
    document.getElementById("forgotForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const email = document.getElementById("forgotEmail").value;
        const btn = document.getElementById("submitBtn");
        
        btn.innerText = "Processing...";
        btn.disabled = true;

        fetch(`http://localhost:8080/api/user/forgot-password?email=${email}`, {
            method: 'POST'
        })
        .then(response => response.text())
        .then(message => {
            alert(message); 
            
            if(message.toLowerCase().includes("success")) {
                window.location.href = "login.html";
            } else {
                btn.innerText = "Send Temporary Password";
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Connection error: Unable to connect to the server.");
            btn.innerText = "Send Temporary Password";
            btn.disabled = false;
        });
    });
    </script>
</body>
</html>
