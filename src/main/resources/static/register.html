<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Burnout Detection System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }
        .register-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        .register-card {
            width: 100%;
            max-width: 480px;
            padding: 35px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            color: #333;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 10px rgba(255,193,7,0.5);
        }
        .footer-section {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
            border-top: 3px solid #fda085;
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Burnout System</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="register-container">
        <div class="register-card">
            <h3 class="text-center fw-bold mb-4">User Registration</h3>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-user"></i> Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-envelope"></i> Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-calendar"></i> Age</label>
                    <input type="number" id="regAge" class="form-control" placeholder="Enter your age" required>
                </div>
                <div class="mb-4">
                    <label class="form-label"><i class="fa fa-briefcase"></i> Profession</label>
                    <input type="text" id="regProfession" class="form-control" placeholder="e.g. Student, Software Engineer" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Register</button>
            </form>
            <div class="text-center mt-3 small">
                <p class="mb-0">Already have an account? <a href="login.html" class="text-warning text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>

    <footer class="footer-section text-center">
        <p class="mb-1">© 2026 Burnout Detection System | All Rights Reserved</p>
        <p class="mb-0">Developed by: <strong>Ajeet Singh</strong></p>
    </footer>

    <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        // Target object maps directly to the User model properties
        const userData = {
            name: document.getElementById("regName").value,
            email: document.getElementById("regEmail").value.trim(),
            password: document.getElementById("regPassword").value,
            age: parseInt(document.getElementById("regAge").value),
            profession: document.getElementById("regProfession").value
        };

        // FIXED: Changed localhost to Render Live URL
        fetch(`https://burnout-system-iwyd.onrender.com/api/user/register`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
        .then(res => {
            if(!res.ok) {
                return res.text().then(text => { throw new Error(text) });
            }
            return res.text();
        })
        .then(msg => {
            alert(msg); 
            window.location.href = "login.html";
        })
        .catch(err => {
            console.error("Transmission Error:", err);
            alert("Registration failed: " + err.message);
        });
    });
    </script>
</body>
</html>
