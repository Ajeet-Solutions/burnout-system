<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Burnout Detection System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            color: #333;
        }
        .input-group-text {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            cursor: pointer;
        }
        .footer-section {
            background-color: #222;
            color: #fff;
            font-family: 'Arial', sans-serif;
            border-top: 3px solid #fda085;
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Burnout System</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="result.html">Result</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h3 class="text-center fw-bold mb-4">User Login</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-envelope"></i> Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fa fa-lock"></i> Password</label>
                    <div class="input-group">
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                        <span class="input-group-text" onclick="togglePasswordVisibility()"><i id="eyeIcon" class="fa fa-eye"></i></span>
                    </div>
                </div>
                <div class="mb-3 form-check d-flex justify-content-between">
                    <div>
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Remember Me</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Login</button>
            </form>
            <div class="text-center mt-3 small">
                <p class="mb-1"><a href="forgot.html" class="text-warning text-decoration-none">Forgot Password?</a></p>
                <p class="mb-0">Don't have an account? <a href="register.html" class="text-warning text-decoration-none">Register</a></p>
            </div>
        </div>
    </div>

    <footer class="footer-section text-center">
        <p class="mb-1">© 2026 Burnout Detection System | All Rights Reserved</p>
        <p class="mb-0">Developed by: <strong>Ajeet Singh</strong></p>
    </footer>

    <script>
    function togglePasswordVisibility() {
        const passwordField = document.getElementById("loginPassword");
        const eyeIcon = document.getElementById("eyeIcon");
        if (passwordField.type === "password") {
            passwordField.type = "text";
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        }
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        // BINDING CHANGE: Localhost link ko hatakar Render live URL se replace kar diya hai
        fetch(`https://burnout-system-iwyd.onrender.com/api/user/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
            method: 'POST'
        })
        .then(res => res.text())
        .then(result => {
            const resClean = result.trim().toUpperCase();
            
            if(resClean.includes("SUCCESS") || resClean.includes("ACTIVE") || result.toLowerCase().includes("session")) {
                localStorage.setItem("userEmail", email);
                localStorage.setItem("email", email);
                
                alert("Login Successful! ✅");
                window.location.href = "assessment.html"; 
            } else {
                alert(result);
            }
        })
        .catch(err => {
            console.error("Connection failure:", err);
            alert("Server connection error. Please verify backend status.");
        });
    });
    </script>
</body>
</html>
